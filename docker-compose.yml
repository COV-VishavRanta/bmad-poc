version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bmad-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bmad_db}
      MYSQL_USER: ${MYSQL_USER:-bmad_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bmad_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bmad-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bmad-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-bmad_user}:${MYSQL_PASSWORD:-bmad_password}@mysql:3306/${MYSQL_DATABASE:-bmad_db}
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
    networks:
      - bmad-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bmad-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bmad-network

volumes:
  mysql_data:

networks:
  bmad-network:
    driver: bridge